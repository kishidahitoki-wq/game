<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cat Runner</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <!-- Canvas for rendering the game -->
        <canvas id="gameCanvas"></canvas>

        <!-- UI Overlay -->
        <div id="ui-layer">
            <div id="hud">
                <div class="hud-item score-container">
                    <span class="label">SCORE</span>
                    <span id="score">0</span>
                </div>
                <div class="hud-item hp-container">
                    <span class="label">HP</span>
                    <div id="hp-bar-container">
                        <div id="hp-bar"></div>
                    </div>
                </div>
            </div>

            <!-- Start Menu -->
            <div id="start-menu" class="screen active">
                <h1>NEON CAT RUNNER</h1>
                <p>Use [Arrow Keys] to run!</p>
                <ul class="controls-list">
                    <li><span class="key">↑</span> Jump</li>
                    <li><span class="key">↓</span> Duck</li>
                    <li><span class="key">→</span> Move Right</li>
                    <li><span class="key">←</span> Move Left</li>
                </ul>
                <button id="start-btn" class="glow-button">START GAME</button>
            </div>

            <!-- Game Over Menu -->
            <div id="game-over-menu" class="screen">
                <h2>GAME OVER</h2>
                <div class="result-score">
                    <span>FINAL SCORE</span>
                    <span id="final-score">0</span>
                </div>
                <button id="restart-btn" class="glow-button">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
